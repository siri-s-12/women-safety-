services:
  # Backend API (Node.js/Express)
  - type: web
    name: safeher-india-backend
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
